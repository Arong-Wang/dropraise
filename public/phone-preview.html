<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>手機預覽 — Dropraise</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, sans-serif;
  }

  /* ── 手機外殼 ── */
  .phone {
    position: relative;
    width: 412px;
    height: 866px;
    background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
    border-radius: 56px;
    box-shadow:
      inset 0 0 0 1.5px #3a3a3a,
      inset 0 0 0 3px #111,
      0 0 0 1px #000,
      0 30px 80px rgba(0,0,0,0.9),
      0 0 40px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  /* 音量鍵 */
  .btn { position: absolute; background: #2c2c2c; border-radius: 3px; box-shadow: -1px 0 2px rgba(0,0,0,0.5); }
  .btn-silent  { left: -4px; top: 100px; width: 4px; height: 30px; }
  .btn-vol-up  { left: -4px; top: 148px; width: 4px; height: 56px; }
  .btn-vol-dn  { left: -4px; top: 218px; width: 4px; height: 56px; }
  .btn-power   { right: -4px; top: 170px; width: 4px; height: 72px; box-shadow: 1px 0 2px rgba(0,0,0,0.5); }

  /* ── 螢幕區 ── */
  .screen {
    position: absolute;
    inset: 10px;
    border-radius: 46px;
    background: #000;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* Dynamic Island */
  .island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 35px;
    background: #000;
    border-radius: 18px;
    z-index: 30;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    pointer-events: none;
  }

  /* 狀態列 */
  .statusbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 58px;
    z-index: 25;
    display: flex;
    align-items: flex-end;
    padding: 0 30px 10px;
    justify-content: space-between;
    pointer-events: none;
  }
  .statusbar .time {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .statusbar .icons {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  /* Home indicator */
  .home {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 5px;
    background: rgba(255,255,255,0.35);
    border-radius: 3px;
    z-index: 20;
  }

  /* ── iframe (網站內容) ── */
  .iframe-wrap {
    position: absolute;
    top: 58px;
    left: 0;
    right: 0;
    bottom: 30px;
    overflow: hidden;
  }

  iframe {
    width: 390px;
    height: 100%;
    border: none;
    display: block;
    margin: 0 auto;
    overflow: hidden;
  }

  /* 隱藏 iframe 內的捲軸 */
  .iframe-wrap::-webkit-scrollbar { display: none; }

  /* ── 工具列 ── */
  .toolbar {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
  }
  .toolbar button {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.15); }
  .toolbar .url {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    min-width: 200px;
    text-align: center;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <!-- 實體按鍵 -->
    <div class="btn btn-silent"></div>
    <div class="btn btn-vol-up"></div>
    <div class="btn btn-vol-dn"></div>
    <div class="btn btn-power"></div>

    <!-- 螢幕 -->
    <div class="screen">
      <!-- 狀態列 -->
      <div class="statusbar">
        <span class="time" id="clock">9:41</span>
        <div class="icons">
          <!-- Signal bars -->
          <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
            <rect x="0" y="7" width="3" height="6" rx="1" fill="white"/>
            <rect x="5" y="4.5" width="3" height="8.5" rx="1" fill="white"/>
            <rect x="10" y="2" width="3" height="11" rx="1" fill="white"/>
            <rect x="15" y="0" width="3" height="13" rx="1" fill="white" opacity="0.3"/>
          </svg>
          <!-- WiFi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="white">
            <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
            <path d="M3.5 6.4A6.5 6.5 0 0 1 8 4.8a6.5 6.5 0 0 1 4.5 1.6l1.5-1.7A8.8 8.8 0 0 0 8 3a8.8 8.8 0 0 0-6 2.7l1.5 1.7z" opacity=".6"/>
            <path d="M5.5 8.2A3.5 3.5 0 0 1 8 7.2a3.5 3.5 0 0 1 2.5 1l1.5-1.6A5.8 5.8 0 0 0 8 5.5a5.8 5.8 0 0 0-4 1.1l1.5 1.6z"/>
          </svg>
          <!-- Battery -->
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
            <rect x="0.5" y="0.5" width="21" height="12" rx="3.5" stroke="white" stroke-opacity=".35"/>
            <rect x="2" y="2" width="16" height="9" rx="2" fill="white"/>
            <path d="M23 4.5v4a2 2 0 0 0 0-4z" fill="white" opacity=".4"/>
          </svg>
        </div>
      </div>

      <!-- Dynamic Island -->
      <div class="island"></div>

      <!-- 網站 iframe -->
      <div class="iframe-wrap">
        <iframe id="preview" src="" allow="same-origin" style="scrollbar-width:none;"></iframe>
      </div>

      <!-- Home indicator -->
      <div class="home"></div>
    </div>
  </div>

  <!-- 工具列 -->
  <div class="toolbar">
    <button onclick="go('/')">首頁</button>
    <button onclick="go('/interior')">作品</button>
    <button onclick="go('/about')">關於</button>
    <button onclick="go('/contact')">聯絡</button>
    <button onclick="reload()">↺ 重新整理</button>
    <div class="url" id="urlbar"></div>
  </div>
</div>

<script>
  // 讀取 ?url= 參數，預設為 localhost:3000
  const params = new URLSearchParams(location.search);
  const BASE = params.get('url') || 'http://localhost:3000';
  const iframe = document.getElementById('preview');
  const urlbar = document.getElementById('urlbar');
  iframe.src = BASE;
  urlbar.textContent = BASE.replace(/^https?:\/\//, '');

  // 隱藏 iframe 內的捲軸（同源才有效）
  iframe.addEventListener('load', function() {
    try {
      const style = this.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none!important}html,body{scrollbar-width:none!important;-ms-overflow-style:none!important;}';
      this.contentDocument.head.appendChild(style);
    } catch(e) {}
  });

  // 即時時鐘
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // 導覽按鈕（只在 localhost 模式下有效）
  function go(path) {
    iframe.src = BASE + path;
    urlbar.textContent = BASE.replace(/^https?:\/\//, '') + path;
  }
  function reload() {
    iframe.contentWindow.location.reload();
  }
</script>
</body>
</html>
